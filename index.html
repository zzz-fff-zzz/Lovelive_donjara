<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>爱生活麻将</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="game-board">
            <!-- 游戏界面将通过JavaScript动态生成 -->
        </div>
        <!-- 吃牌通知 -->
        <div id="chi-notification" class="chi-notification"></div>
    </div>
    
    <!-- 终局结算界面 -->
    <div id="final-settlement-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="settlement-title">游戏结束</h2>
            <div id="winner-name" class="winner-name"></div>
            <div id="win-type-score" class="win-type-score"></div>
            <div id="bonus-scores" class="bonus-scores"></div>
            <div id="total-score" class="win-type-score"></div>
            <h3>胜利手牌</h3>
            <div id="winning-tiles" class="winning-tiles"></div>
            <button id="close-settlement" class="close-settlement-btn">关闭</button>
        </div>
    </div>
    
    <!-- 规则弹窗 -->
    <div id="rule-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>游戏规则</h2>
            <div id="rule-content" class="rule-content"></div>
            <button id="close-rule" class="close-settlement-btn">关闭</button>
        </div>
    </div>
    
    <!-- 规则按钮 -->
    <button id="rule-btn" class="rule-btn">规则</button>
    
    <script src="game.js"></script>
</body>
</html>
